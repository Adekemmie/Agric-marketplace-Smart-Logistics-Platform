<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - AgricConnect</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #f5f5f5;
        }

        /* NAVBAR */
        header {
            background-color: #2e7d32;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        /* PAGE TITLE */
        .title {
            text-align: center;
            margin: 30px 0;
        }

        .title h1 {
            color: #2e7d32;
        }

        /* PRODUCT GRID */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .product-card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-card h3 {
            margin: 10px 0;
            color: #2e7d32;
        }

        .product-card p {
            margin-bottom: 10px;
        }

        .product-card button {
            padding: 10px 15px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .product-card button:hover {
            background-color: #1b5e20;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <h2>🌱 AgricConnect</h2>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <!-- TITLE -->
    <div class="title">
        <h1>Marketplace</h1>
        <p>Browse fresh farm produce</p>
    </div>

    <!-- PRODUCTS -->
    <section class="products">

        <div class="product-card">
            <img src="images/tomatoes.jpg" alt="Tomatoes">
            <h3>Fresh Tomatoes</h3>
            <p>₦20,000 per basket</p>
            <button onclick="alert('Order placed!')">Order</button>
        </div>

        <div class="product-card">
            <img src="images/local rice.jpg" alt="Rice">
            <h3>Local Rice</h3>
            <p>₦75,000 per bag</p>
            <button onclick="alert('Order placed!')">Order</button>
        </div>

        <div class="product-card">
            <img src="images/pepper.jpg" alt="Pepper">
            <h3>Red Pepper</h3>
            <p>₦15,000 per basket</p>
            <button onclick="alert('Order placed!')">Order</button>
        </div>

        <div class="product-card">
            <img src="images/maize.jpg" alt="Maize">
            <h3>Maize</h3>
            <p>₦35,000 per bag</p>
            <button onclick="alert('Order placed!')">Order</button>
        </div>

    </section>

</body>
</html>
